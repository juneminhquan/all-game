<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
        }
        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .cta-button {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .lesson-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 8px;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        .lesson-card h3 {
            margin: 0 0 10px 0;
            font-size: 1.3em;
        }
        .lesson-card p {
            margin: 0;
            font-size: 0.95em;
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>English Lessons</h1>
        <p>Choose a lesson to begin learning</p>
        
        <div class="lessons-grid" id="lessonsGrid">
            <div class="lesson-card">
                <h3>Loading lessons...</h3>
                <p>Please wait while lessons are discovered.</p>
            </div>
        </div>
    </div>

    <script>
        const lessonsGrid = document.getElementById('lessonsGrid');
        const lessonFolder = 'english/';
        const lessonPrefix = 'lesson';
        const maxLessons = 50;
        const maxConsecutiveMisses = 5;

        function createLessonCard(url, title, description) {
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.className = 'lesson-card';
            anchor.innerHTML = `
                <h3>${title}</h3>
                <p>${description}</p>
            `;
            return anchor;
        }

        function formatTitleFromFilename(filename) {
            const match = filename.match(/lesson(\d+)\.html$/i);
            return match ? `Lesson ${match[1]}` : filename;
        }

        async function fetchDirectoryListing() {
            try {
                const response = await fetch(lessonFolder, { method: 'GET' });
                if (!response.ok) return null;
                const contentType = response.headers.get('content-type') || '';
                if (!contentType.includes('text/html')) return null;
                const text = await response.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const links = Array.from(doc.querySelectorAll('a'))
                    .map(link => link.getAttribute('href'))
                    .filter(href => href && href.match(/^lesson\d+\.html$/i));
                return Array.from(new Set(links));
            } catch (error) {
                return null;
            }
        }

        async function discoverLessons() {
            const directoryLessons = await fetchDirectoryListing();
            if (directoryLessons && directoryLessons.length) {
                return directoryLessons.sort((a, b) => {
                    const aNum = Number(a.match(/lesson(\d+)\.html/i)?.[1] || 0);
                    const bNum = Number(b.match(/lesson(\d+)\.html/i)?.[1] || 0);
                    return aNum - bNum;
                });
            }

            const foundLessons = [];
            let consecutiveMisses = 0;
            for (let i = 1; i <= maxLessons && consecutiveMisses < maxConsecutiveMisses; i += 1) {
                const url = `${lessonFolder}${lessonPrefix}${i}.html`;
                try {
                    const response = await fetch(url, { method: 'HEAD' });
                    if (response.ok) {
                        foundLessons.push(`${lessonPrefix}${i}.html`);
                        consecutiveMisses = 0;
                    } else {
                        consecutiveMisses += 1;
                    }
                } catch (error) {
                    consecutiveMisses += 1;
                }
            }
            return foundLessons;
        }

        async function renderLessons() {
            const lessons = await discoverLessons();
            lessonsGrid.innerHTML = '';

            if (!lessons || !lessons.length) {
                lessonsGrid.innerHTML = `
                    <div class="lesson-card" style="background: #ffe4e6; color: #9f1239;">
                        <h3>No lessons found</h3>
                        <p>If your lessons are in /english/, ensure they follow the pattern <code>lessonN.html</code>.</p>
                    </div>
                `;
                return;
            }

            lessons.forEach(filename => {
                const title = formatTitleFromFilename(filename);
                const description = `Open ${title}`;
                lessonsGrid.appendChild(createLessonCard(`${lessonFolder}${filename}`, title, description));
            });
        }

        renderLessons();
    </script>
</body>
</html>
